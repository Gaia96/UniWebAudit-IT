# WAVE Browser Extension — Data Entry Template
# Run ID: WVRUN_browser_001
#
# HOW TO FILL IN:
#   1. Open each URL in Chrome with the WAVE extension installed.
#   2. Activate WAVE and wait for it to finish analysing the page.
#   3. Read the summary panel (category counts + page info).
#   4. For each category, expand the item list and note each rule ID + count.
#   5. Replace all FILL_IN values below with what you observe.
#      Leave fields as null if the value is genuinely not available.
#   6. Do NOT save this file until you have real data.
#
# AFTER FILLING IN:
#   Run:  python wave/scripts/wave_browser_import.py
#   The script validates this file and appends rows to wave_results.csv
#   and wave_items_long.csv. It will refuse to run if any required fieldc
#   is still set to FILL_IN.
#
# WAVE extension item IDs follow the same rule taxonomy as the API.
# A reference list is at: https://wave.webaim.org/api/docs

