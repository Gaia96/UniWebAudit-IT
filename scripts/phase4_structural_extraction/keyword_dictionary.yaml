# keyword_dictionary.yaml — Phase 4 Structural Extraction
# Versione: v2  Autore: claude_code  Review utente: 2026-05-06
# Modifiche v2: priority corrette (academic_year/language/location → essential);
#   keywords rafforzate (academic_year, language, admission_*, deadlines, career_outcomes,
#   portali); regole conservative FP per contacts/@, deadlines/mesi, language, location,
#   academic_year.
#
# Struttura per indicatore:
#   indicator_id   — corrisponde alle colonne di structural_indicators.csv
#   label          — label umana
#   priority       — essential | important | contextual  (Sezione 8 metodo)
#   keywords       — stringhe in minuscolo cercate nel testo visibile (IT/EN)
#   heading_signals — regex cercati specificamente nei tag h1-h6
#   selector_hints  — selettori CSS per tab/accordion/table containers
#   pdf_label_hints — keyword che, nel testo anchor di un link .pdf, contano come linked_pdf
#   confidence_rules:
#     high   — condizione per confidence alta
#     medium — condizione per confidence media
#     low    — condizione per confidence bassa
#
# Regole FP conservative (v2):
#   - contacts: @ senza contesto "contatti/segreteria/referente/coordinatore" → low
#   - deadlines: mese da solo senza "scadenza/deadline/entro/iscrizione/bando" → low
#   - language: "italiano/inglese" come materia senza "lingua di erogazione/taught in" → low
#   - location: indirizzo in footer/navigazione senza "sede/campus/luogo di svolgimento" → low
#   - academic_year: pattern YYYY/YY senza "anno accademico/a.a./offerta formativa/coorte" → low

indicators:

  # ─────────────────────────────────────────────────────────────────────
  # ESSENTIAL  (10)
  # ─────────────────────────────────────────────────────────────────────

  - indicator_id: course_title
    label: "Course title"
    priority: essential
    keywords:
      - "titolo del corso"
      - "nome del corso"
      - "denominazione"
    heading_signals:
      - "scienze della comunicazione"
      - "comunicazione"
      - "laurea"
      - "bachelor"
      - "master"
      - "giurisprudenza"
      - "beni culturali"
      - "digital"
    selector_hints:
      - "h1"
      - ".page-title"
      - ".course-title"
      - "#page-title"
      - "title"
    pdf_label_hints: []
    confidence_rules:
      high: "H1 tag non vuoto o <title> non vuoto"
      medium: "titolo estratto da meta og:title o breadcrumb finale"
      low: "nessun H1; titolo solo da URL path"

  - indicator_id: degree_level
    label: "Degree level"
    priority: essential
    keywords:
      - "laurea triennale"
      - "laurea magistrale"
      - "laurea magistrale a ciclo unico"
      - "ciclo unico"
      - "bachelor"
      - "master"
      - "single-cycle"
      - "triennale"
      - "magistrale"
      - "primo ciclo"
      - "secondo ciclo"
      - "l-"
      - "lm-"
      - "lmcu"
    heading_signals:
      - "laurea\\s+(triennale|magistrale|ciclo unico)"
      - "corso di (laurea|studio)"
      - "bachelor|master"
    selector_hints:
      - ".degree-type"
      - ".course-type"
      - ".tipologia-corso"
      - "dd"
      - ".scheda-corso"
    pdf_label_hints: []
    confidence_rules:
      high: "heading o label esplicita con triennale/magistrale/ciclo unico"
      medium: "keyword nel summary box o nella description"
      low: "solo classe di laurea (L-/LM-) senza label esplicita"

  - indicator_id: academic_year
    label: "Academic year or edition"
    priority: essential
    keywords:
      - "anno accademico"
      - "a.a. 2025"
      - "a.a. 2024"
      - "a.a. 2026"
      - "a.a."
      - "coorte"
      - "2025/2026"
      - "2024/2025"
      - "2026/2027"
      - "2025/26"
      - "2024/25"
      - "2026/27"
      - "offerta formativa 202"
      - "guida dello studente 202"
    heading_signals:
      - "anno accademico"
      - "a\\.a\\. 20\\d\\d"
      - "offerta formativa \\d{4}"
      - "coorte \\d{4}"
    selector_hints:
      - ".anno-accademico"
      - ".academic-year"
      - "dd"
      - ".scheda-corso td"
    pdf_label_hints:
      - "manifesto degli studi"
      - "guida dello studente"
      - "offerta didattica"
      - "offerta formativa"
    # FP conservative: pattern YYYY/YY da solo (senza "a.a." o "anno accademico" vicino) → low
    confidence_rules:
      high: "anno accademico esplicito (es. a.a. 2025/26 o 'coorte 2025') vicino a label dedicata o in heading"
      medium: "pattern YYYY/YYYY o YYYY/YY nel testo con contesto a.a./offerta formativa"
      low: "pattern YYYY/YY isolato senza contesto accademico; anno nel solo URL"

  - indicator_id: language
    label: "Teaching language"
    priority: essential
    keywords:
      - "lingua di erogazione"
      - "lingua di insegnamento"
      - "language of instruction"
      - "taught in english"
      - "erogato in inglese"
      - "corso in inglese"
      - "insegnamento in inglese"
      - "teaching language"
      - "lingua: italiano"
      - "lingua: inglese"
      - "bilingue"
      - "bilingual"
    heading_signals:
