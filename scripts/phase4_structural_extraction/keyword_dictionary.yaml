      - ".language"
      - "dd"
      - ".scheda-corso td"
    pdf_label_hints: []
    # FP conservative: "italiano" o "inglese" come materia/disciplina senza "lingua di erogazione/taught in" → low
    confidence_rules:
      high: "label 'Lingua di erogazione / insegnamento' o 'Language of instruction' con valore esplicito"
      medium: "phrase 'taught in English' / 'erogato in inglese' / 'insegnamento in inglese' nel corpo pagina"
      low: "presenza di 'italiano' o 'inglese' come lingua ma senza contesto di erogazione (es. nome disciplina, link lingua straniera)"

